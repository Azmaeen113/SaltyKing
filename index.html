<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Salty Kingdom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Pirata+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#FFD700;--gold2:#FFA500;--gold3:#B8860B;
  --navy:#0a1628;--navy2:#112244;--navy3:#1a3366;
  --ocean:#1a6e8e;--ocean2:#0d4d6b;
  --red:#c0392b;--red2:#8b0000;
  --purple:#6a0dad;--purple2:#4a0080;
  --teal:#0e6655;--teal2:#0a4d40;
  --bg:#07101f;
  --text:#f5e6c8;
  --text2:#c8a96e;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Cinzel',serif;color:var(--text);}
#app{width:100%;height:100%;position:relative;overflow:hidden;}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ===== SPLASH ===== */
#splash{background:linear-gradient(180deg,#0d2137 0%,#071525 60%,#030d18 100%);align-items:center;justify-content:center;}
#splash .stars{position:absolute;inset:0;overflow:hidden;}
#splash .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate;}
@keyframes twinkle{0%{opacity:.2;}100%{opacity:1;}}
#splash .ocean-bg{position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(180deg,transparent,#0a2a3d,#051520);}
#splash .splash-content{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;}
#splash .logo-shield{width:260px;height:auto;filter:drop-shadow(0 0 30px rgba(255,215,0,0.6));}
.logo-img{width:240px;display:block;margin:0 auto;}
#splash .subtitle{font-family:'Pirata One',cursive;font-size:18px;color:var(--gold2);letter-spacing:4px;text-shadow:0 0 20px rgba(255,165,0,0.8);}
#splash .play-btn{margin-top:16px;background:linear-gradient(135deg,#FFD700,#FF8C00,#FFD700);border:none;border-radius:50px;padding:16px 60px;font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:#1a0a00;cursor:pointer;box-shadow:0 0 30px rgba(255,165,0,0.7),inset 0 1px 0 rgba(255,255,255,0.4);animation:pulse-glow 2s infinite;}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(255,165,0,0.6),inset 0 1px 0 rgba(255,255,255,0.4);}50%{box-shadow:0 0 50px rgba(255,165,0,1),inset 0 1px 0 rgba(255,255,255,0.4);}}
#splash .social-row{display:flex;gap:12px;margin-top:8px;}
#splash .soc-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;background:rgba(0,0,0,0.4);}

/* ===== GAME SCREEN ===== */
#game{background:#07101f;flex-direction:column;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:linear-gradient(180deg,rgba(0,0,30,0.95),rgba(0,0,20,0.8));border-bottom:1px solid var(--gold3);flex-shrink:0;z-index:10;}
.top-bar .player-info{display:flex;align-items:center;gap:8px;}
.avatar{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;background:var(--navy2);display:flex;align-items:center;justify-content:center;font-size:20px;}
.player-data{display:flex;flex-direction:column;}
.player-name{font-size:11px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;}
.player-lvl{font-size:9px;color:var(--text2);margin-top:1px;}
.coins-display{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.5);border:1px solid var(--gold3);border-radius:20px;padding:3px 8px;}
.coins-display .coin-icon{font-size:14px;}
.coins-display span{font-size:12px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;}
.top-title{text-align:center;}
.top-title h1{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,0.5);line-height:1.1;}
.top-title .tagline{font-size:8px;color:var(--text2);letter-spacing:2px;}
.booty-chest{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.booty-label{font-size:9px;color:var(--gold2);font-weight:700;letter-spacing:1px;}
.booty-count{font-size:11px;color:var(--text);font-weight:700;}
.booty-bar{width:60px;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.booty-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:3px;transition:width 0.5s;}

/* REF BONUS BAR */
.ref-bar{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(106,13,173,0.2);border-bottom:1px solid rgba(106,13,173,0.4);flex-shrink:0;}
.ref-bar .ref-icon{font-size:14px;}
.ref-bar .ref-text{font-size:10px;color:var(--text2);}
.ref-bar .ref-val{font-size:11px;font-weight:700;color:var(--gold);}
.ref-bar .ref-btn{margin-left:auto;background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;border-radius:8px;padding:3px 10px;font-size:9px;color:white;cursor:pointer;font-family:'Cinzel',serif;}

/* BOARD AREA */
.board-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.board-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,#1a5276 0%,#0d3d5c 30%,#071e2e 70%,#030f1a 100%);}
.ocean-shine{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 45%,rgba(26,110,142,0.3) 0%,transparent 65%);}

/* ISLAND */
.island-container{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);z-index:2;}
.island-svg{width:200px;height:200px;filter:drop-shadow(0 4px 20px rgba(255,215,0,0.3));}

/* BOARD TRACK */
.board-track{position:absolute;inset:0;z-index:3;}
.tile{position:absolute;width:44px;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;border:2px solid rgba(255,255,255,0.15);overflow:hidden;}
.tile:hover{transform:scale(1.08);}
.tile.coin{background:linear-gradient(135deg,#3d2800,#5c3a00);border-color:var(--gold3);}
.tile.chest{background:linear-gradient(135deg,#3d0a00,#6b1500);border-color:#c0392b;}
.tile.multiplier{background:linear-gradient(135deg,#003d4d,#006680);border-color:#00bcd4;}
.tile.skull{background:linear-gradient(135deg,#1a0000,#3d0000);border-color:#8b0000;}
.tile.crown{background:linear-gradient(135deg,#2d004d,#5a0080);border-color:#9b59b6;}
.tile.wheel{background:linear-gradient(135deg,#1a2800,#2e4a00);border-color:#4caf50;}
.tile.start{background:linear-gradient(135deg,#3d0000,#8b1500);border-color:#ff6b35;}
.tile-icon{font-size:20px;line-height:1;}
.tile-label{font-size:7px;color:rgba(255,255,255,0.7);margin-top:1px;font-family:'Cinzel',serif;}
.tile.player-here{box-shadow:0 0 0 3px #FFD700,0 0 20px rgba(255,215,0,0.8);animation:player-pulse 1s infinite alternate;}
@keyframes player-pulse{0%{box-shadow:0 0 0 3px #FFD700,0 0 10px rgba(255,215,0,0.6);}100%{box-shadow:0 0 0 3px #FFD700,0 0 30px rgba(255,215,0,1);}}
.player-token{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:18px;z-index:10;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));}

/* BOTTOM BAR */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 12px;background:linear-gradient(0deg,rgba(0,0,30,0.98),rgba(0,0,20,0.85));border-top:1px solid var(--gold3);flex-shrink:0;}
.energy-pill{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(0,0,0,0.5);border:1px solid var(--gold3);border-radius:10px;padding:5px 10px;min-width:70px;}
.energy-icon{font-size:16px;}
.energy-count{font-size:10px;font-weight:700;color:var(--gold);}
.energy-label{font-size:8px;color:var(--text2);}
.roll-btn{background:linear-gradient(135deg,#c0392b,#8b0000,#c0392b);border:none;border-radius:14px;padding:12px 28px;font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:white;cursor:pointer;box-shadow:0 4px 20px rgba(192,57,43,0.6),inset 0 1px 0 rgba(255,255,255,0.2);letter-spacing:1px;transition:transform 0.1s,box-shadow 0.1s;min-width:120px;position:relative;}
.roll-btn:active{transform:scale(0.96);box-shadow:0 2px 10px rgba(192,57,43,0.4);}
.roll-sub{display:block;font-size:8px;font-family:'Cinzel',serif;color:rgba(255,255,255,0.7);letter-spacing:2px;margin-top:2px;}
.roll-btn.rolling{animation:shake 0.5s ease-in-out;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-4px) rotate(-2deg);}40%{transform:translateX(4px) rotate(2deg);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
.dice-side{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(0,0,0,0.5);border:1px solid var(--gold3);border-radius:10px;padding:5px 10px;min-width:70px;cursor:pointer;}
.dice-icon{font-size:22px;}

/* OVERLAY */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);z-index:50;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.overlay.hidden{display:none;}
.modal{background:linear-gradient(135deg,#0d1f3d,#122244);border:2px solid var(--gold);border-radius:20px;padding:24px;max-width:320px;width:90%;text-align:center;position:relative;box-shadow:0 0 40px rgba(255,215,0,0.3);}
.modal h2{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);margin-bottom:8px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5;}
.modal .reward-amount{font-size:36px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;text-shadow:0 0 20px rgba(255,215,0,0.8);margin:8px 0;}
.modal .close-btn{background:linear-gradient(135deg,var(--gold2),var(--gold3));border:none;border-radius:10px;padding:10px 30px;font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#1a0a00;cursor:pointer;width:100%;}
.dice-result{font-size:60px;margin:8px 0;animation:dice-spin 0.5s ease-out;}
@keyframes dice-spin{0%{transform:rotate(0deg) scale(0.5);opacity:0;}50%{transform:rotate(180deg) scale(1.3);}100%{transform:rotate(360deg) scale(1);opacity:1;}}

/* NAV BAR */
.nav-bar{display:flex;background:linear-gradient(0deg,#030d18,#07101f);border-top:1px solid rgba(255,215,0,0.2);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:color 0.2s;gap:2px;}
.nav-btn.active{color:var(--gold);}
.nav-btn .nav-icon{font-size:20px;}
.nav-btn .nav-label{font-size:8px;font-family:'Cinzel',serif;letter-spacing:0.5px;}

/* ===== LEADERBOARD ===== */
#leaderboard-screen{background:linear-gradient(180deg,#07101f,#030d18);padding:0;flex-direction:column;}
.lb-header{padding:16px 16px 8px;background:linear-gradient(180deg,rgba(0,0,30,0.95),transparent);border-bottom:1px solid var(--gold3);flex-shrink:0;}
.lb-header h2{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);text-align:center;}
.lb-list{flex:1;overflow-y:auto;padding:8px 12px 12px;}
.lb-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;margin-bottom:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
.lb-item.top1{background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,165,0,0.1));border-color:var(--gold);}
.lb-item.top2{background:linear-gradient(135deg,rgba(192,192,192,0.12),rgba(128,128,128,0.08));border-color:silver;}
.lb-item.top3{background:linear-gradient(135deg,rgba(205,127,50,0.12),rgba(139,90,43,0.08));border-color:#cd7f32;}
.lb-rank{font-size:16px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;min-width:30px;text-align:center;}
.lb-avatar{font-size:24px;}
.lb-info{flex:1;}
.lb-name{font-size:13px;font-weight:700;color:var(--text);}
.lb-coins{font-size:11px;color:var(--gold2);}
.lb-badge{font-size:10px;color:var(--text2);}

/* ===== RAIDS ===== */
#raids-screen{background:linear-gradient(180deg,#07101f,#030d18);flex-direction:column;}
.raids-header{padding:16px;border-bottom:1px solid var(--red2);background:linear-gradient(180deg,rgba(139,0,0,0.2),transparent);flex-shrink:0;}
.raids-header h2{font-family:'Cinzel Decorative',serif;font-size:18px;color:#ff6b35;text-align:center;}
.raids-header p{font-size:11px;color:var(--text2);text-align:center;margin-top:4px;}
.raid-targets{flex:1;overflow-y:auto;padding:8px 12px 12px;}
.raid-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;margin-bottom:8px;background:linear-gradient(135deg,rgba(139,0,0,0.15),rgba(80,0,0,0.1));border:1px solid rgba(192,57,43,0.3);cursor:pointer;transition:border-color 0.2s;}
.raid-card:hover{border-color:var(--red);}
.raid-avatar{font-size:28px;}
.raid-info{flex:1;}
.raid-name{font-size:13px;font-weight:700;color:var(--text);}
.raid-coins{font-size:11px;color:var(--gold2);}
.raid-chance{font-size:10px;color:var(--text2);}
.raid-btn{background:linear-gradient(135deg,var(--red),var(--red2));border:none;border-radius:8px;padding:6px 14px;font-family:'Cinzel',serif;font-size:11px;color:white;cursor:pointer;}

/* ===== REWARDS ===== */
#rewards-screen{background:linear-gradient(180deg,#07101f,#030d18);flex-direction:column;}
.rewards-header{padding:16px;border-bottom:1px solid var(--gold3);background:linear-gradient(180deg,rgba(255,215,0,0.1),transparent);flex-shrink:0;}
.rewards-header h2{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);text-align:center;}
.rewards-content{flex:1;overflow-y:auto;padding:12px;}
.daily-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;}
.day-card{border-radius:10px;padding:8px 4px;text-align:center;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);}
.day-card.claimed{background:linear-gradient(135deg,rgba(0,100,0,0.3),rgba(0,60,0,0.2));border-color:#4caf50;}
.day-card.today{background:linear-gradient(135deg,rgba(255,165,0,0.2),rgba(255,100,0,0.1));border-color:var(--gold);animation:pulse-border 1.5s infinite alternate;}
@keyframes pulse-border{0%{border-color:var(--gold3);}100%{border-color:var(--gold);box-shadow:0 0 10px rgba(255,215,0,0.5);}}
.day-num{font-size:9px;color:var(--text2);margin-bottom:3px;}
.day-icon{font-size:20px;}
.day-reward{font-size:8px;color:var(--gold);}
.claim-btn{width:100%;background:linear-gradient(135deg,var(--gold2),var(--gold3));border:none;border-radius:10px;padding:10px;font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#1a0a00;cursor:pointer;margin-bottom:12px;}
.claim-btn:disabled{opacity:0.4;cursor:not-allowed;}
.section-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);margin-bottom:8px;letter-spacing:1px;}
.booty-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.booty-card{border-radius:12px;padding:12px;text-align:center;background:linear-gradient(135deg,rgba(139,0,0,0.2),rgba(80,0,0,0.1));border:1px solid rgba(192,57,43,0.3);}
.booty-card .bc-icon{font-size:28px;margin-bottom:4px;}
.booty-card .bc-name{font-size:11px;color:var(--text);font-weight:700;}
.booty-card .bc-val{font-size:10px;color:var(--gold2);margin-top:2px;}
.booty-card .bc-btn{background:linear-gradient(135deg,var(--red),var(--red2));border:none;border-radius:6px;padding:4px 12px;font-size:10px;color:white;cursor:pointer;margin-top:6px;font-family:'Cinzel',serif;}

/* ===== REFERRAL ===== */
#referral-screen{background:linear-gradient(180deg,#07101f,#030d18);flex-direction:column;}
.ref-header{padding:16px;border-bottom:1px solid var(--purple2);background:linear-gradient(180deg,rgba(106,13,173,0.15),transparent);flex-shrink:0;}
.ref-header h2{font-family:'Cinzel Decorative',serif;font-size:18px;color:#b39ddb;text-align:center;}
.ref-content{flex:1;overflow-y:auto;padding:12px;}
.ref-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.ref-stat{text-align:center;padding:10px 6px;border-radius:10px;background:rgba(106,13,173,0.1);border:1px solid rgba(106,13,173,0.3);}
.ref-stat .rs-val{font-size:20px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;}
.ref-stat .rs-lbl{font-size:9px;color:var(--text2);margin-top:2px;}
.ref-code-box{background:rgba(0,0,0,0.4);border:1px solid var(--gold3);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;}
.ref-code-box p{font-size:11px;color:var(--text2);margin-bottom:8px;}
.ref-code{font-size:20px;font-weight:700;color:var(--gold);letter-spacing:4px;font-family:'Cinzel',serif;}
.ref-copy-btn{background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;border-radius:8px;padding:8px 20px;font-family:'Cinzel',serif;font-size:12px;color:white;cursor:pointer;margin-top:10px;width:100%;}
.ref-list-title{font-size:12px;color:var(--text2);margin-bottom:8px;}
.ref-friend{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.04);margin-bottom:4px;border:1px solid rgba(255,255,255,0.06);}
.ref-friend .rf-av{font-size:22px;}
.ref-friend .rf-info{flex:1;}
.ref-friend .rf-name{font-size:12px;color:var(--text);}
.ref-friend .rf-date{font-size:9px;color:var(--text2);}
.ref-friend .rf-bonus{font-size:11px;color:var(--gold);font-weight:700;}

/* COIN ANIMATION */
.coin-fly{position:fixed;pointer-events:none;font-size:24px;z-index:999;animation:coin-fly-up 1s ease-out forwards;}
@keyframes coin-fly-up{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-100px) scale(0.5);opacity:0;}}

/* DICE ROLLING OVERLAY */
#dice-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#dice-overlay.show{display:flex;}
#dice-big{font-size:120px;animation:dice-roll-anim 0.6s ease-out;}
@keyframes dice-roll-anim{0%{transform:rotate(0) scale(0.3);opacity:0;}40%{transform:rotate(540deg) scale(1.4);}70%{transform:rotate(700deg) scale(0.9);}100%{transform:rotate(720deg) scale(1);opacity:1;}}
#dice-num-text{font-family:'Cinzel Decorative',serif;font-size:48px;color:var(--gold);opacity:0;transition:opacity 0.3s;}
#dice-num-text.show{opacity:1;}

/* TOAST */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);border:1px solid var(--gold);color:var(--gold);border-radius:20px;padding:8px 20px;font-size:13px;font-family:'Cinzel',serif;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* SCROLL */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.3);border-radius:2px;}

/* ADMIN */
#admin-screen{background:linear-gradient(180deg,#07101f,#030d18);flex-direction:column;}
.admin-header{padding:12px 16px;border-bottom:1px solid var(--gold3);flex-shrink:0;}
.admin-header h2{font-family:'Cinzel Decorative',serif;font-size:16px;color:var(--gold);}
.admin-content{flex:1;overflow-y:auto;padding:12px;}
.admin-section{margin-bottom:16px;}
.admin-section-title{font-size:11px;color:var(--gold2);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.admin-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.admin-stat{padding:10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
.admin-stat .as-val{font-size:18px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;}
.admin-stat .as-lbl{font-size:9px;color:var(--text2);}
.admin-control{display:flex;gap:8px;margin-bottom:8px;}

/* Video background for non-board/non-splash pages */
.video-bg-screen{
  position:relative;
  overflow:hidden;
  min-height:100%;
  box-sizing:border-box;
  padding-top:0;
}
.video-bg-screen .screen-bg-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}
.video-bg-screen .screen-bg-video video{
  width:100%;
  height:100%;
  min-width:100%;
  min-height:100%;
  object-fit:cover;
  object-position:center;
  filter:saturate(1.05) contrast(1.02);
}
.video-bg-screen .screen-bg-video::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(4,10,25,.58),rgba(4,10,25,.66));
}
.video-bg-screen > :not(.screen-bg-video){
  position:relative;
  z-index:1;
}
.video-bg-screen > .nav-bar{
  margin-top:auto;
}

#leaderboard-screen,
#raids-screen,
#rewards-screen,
#referral-screen,
#admin-screen{
  background:transparent !important;
}

/* 20% empty top area for video pages without hiding bottom nav */
.video-bg-screen .lb-header,
.video-bg-screen .raids-header,
.video-bg-screen .rewards-header,
.video-bg-screen .ref-header,
.video-bg-screen .admin-header{
  margin-top:20vh;
}

/* Keep bottom nav visible (especially Ranks) */
#leaderboard-screen .lb-list,
#raids-screen .raid-targets,
#rewards-screen .rewards-content,
#referral-screen .ref-content,
#admin-screen .admin-content{
  min-height:0;
}

#leaderboard-screen .nav-bar{
  position:relative;
  z-index:3;
}

/* Hard-fix ranks: nav always visible + list always scrollable */
#leaderboard-screen.video-bg-screen.active{
  position:relative;
  display:flex;
  flex-direction:column;
  height:100dvh;
  min-height:100dvh;
  overflow:hidden;
}
#leaderboard-screen.video-bg-screen .lb-header{
  margin-top:20vh;
  flex-shrink:0;
}
#leaderboard-screen.video-bg-screen .lb-list{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  padding-bottom:96px;
}
#leaderboard-screen.video-bg-screen .nav-bar{
  position:sticky;
  bottom:0;
  left:0;
  right:0;
  z-index:10;
  margin-top:0 !important;
  min-height:86px;
  box-sizing:border-box;
  padding-bottom:max(6px, env(safe-area-inset-bottom, 0px));

/* PIRATE SHIP */
.pirate-ship{position:absolute;font-size:40px;opacity:0.5;animation:sail 20s linear infinite;}
@keyframes sail{0%{transform:translateX(-80px);left:-5%;}100%{transform:translateX(0);left:105%;}}
.pirate-ship2{animation-delay:-10s;top:20%;}

/* WAVES */
.wave-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,rgba(26,110,142,0.4),transparent);animation:wave-move 4s linear infinite;}
@keyframes wave-move{0%{transform:translateX(-100%);opacity:0;}50%{opacity:1;}100%{transform:translateX(100%);opacity:0;}}

/* =========================
   CINEMATIC 2.5D OVERHAUL
   ========================= */

#splash::before{

/* Local sprite-sheet based ships */
.ship-sprite{
  background-image:url("2F902437-1FF1-41F1-AD8C-7EFD3E79F688.jpeg");
  background-size:cover;
  background-repeat:no-repeat;
  border:1px solid rgba(255,194,103,.35);
  border-radius:14px;
  box-shadow:0 8px 16px rgba(0,0,0,.35);
}

/* Water caustics and sparkles */
.water-caustics{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
  mix-blend-mode:screen;
  opacity:.42;
  overflow:hidden;
}
.water-caustics::before,.water-caustics::after{
  content:"";
  position:absolute;
  inset:-20%;
  background:
    repeating-radial-gradient(circle at 50% 50%,
      rgba(130,227,255,.15) 0 6px,
      rgba(130,227,255,.02) 6px 22px,
      transparent 22px 36px);
  animation:caustics-drift 18s linear infinite;
}
.water-caustics::after{
  opacity:.65;
  transform:scale(1.2) rotate(18deg);
  animation-duration:24s;
  animation-direction:reverse;
}
@keyframes caustics-drift{
  0%{transform:translate3d(-8%,-4%,0) rotate(0deg);}
  50%{transform:translate3d(6%,5%,0) rotate(3deg);}
  100%{transform:translate3d(-8%,-4%,0) rotate(0deg);}
}

#sparkle-layer{
  position:absolute;
  inset:0;
  z-index:6;
  pointer-events:none;
  overflow:hidden;
}
.spark{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:radial-gradient(circle,#fff2b9 0%, #8eeeff 45%, rgba(255,255,255,0) 75%);
  filter:drop-shadow(0 0 8px rgba(163,240,255,.7));
  animation:spark-float linear forwards;
}
@keyframes spark-float{
  0%{opacity:0;transform:translate3d(0,20px,0) scale(.2);}
  15%{opacity:1;}
  100%{opacity:0;transform:translate3d(var(--sx),var(--sy),0) scale(1);}
}

/* Camera and impact effects */
.board-area.camera-roll{animation:camera-roll .45s linear;}
.board-area.camera-land{animation:camera-land .26s ease-out;}
@keyframes camera-roll{
  0%{transform:translate3d(0,0,0);}
  20%{transform:translate3d(-1.5px,1px,0) rotate(-.25deg);}
  40%{transform:translate3d(2px,-1px,0) rotate(.25deg);}
  60%{transform:translate3d(-1px,2px,0) rotate(-.15deg);}
  80%{transform:translate3d(1px,-1px,0) rotate(.15deg);}
  100%{transform:translate3d(0,0,0);}
}
@keyframes camera-land{
  0%{transform:translate3d(0,-3px,0) scale(1.01);}
  30%{transform:translate3d(0,2px,0) scale(.995);}
  100%{transform:translate3d(0,0,0) scale(1);}
}

/* 3D Dice */
#dice-overlay{
  background:radial-gradient(circle at 50% 35%, rgba(35,75,120,.35), rgba(0,0,0,.9));
}
#dice-3d-wrap{
  width:146px;
  height:146px;
  perspective:900px;
}
.dice-cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transform:rotateX(-20deg) rotateY(32deg);
  transition:transform .75s cubic-bezier(.22,.61,.36,1);
}
.dice-face{
  position:absolute;
  inset:0;
  border-radius:16px;
  border:1px solid rgba(255,238,182,.85);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.45), transparent 35%),
    linear-gradient(180deg,#fff9e8 0%, #e7e0cd 85%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8), inset 0 -9px 10px rgba(0,0,0,.16);
  display:flex;
  align-items:center;
  justify-content:center;
}
.dice-face .pip-grid{
  width:76%;
  height:76%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
}
.pip{
  width:16px;height:16px;border-radius:50%;
  margin:auto;
  background:radial-gradient(circle at 36% 30%, #2f4e8d 0%, #152851 75%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
}
.dice-face.f1{transform:translateZ(72px);}
.dice-face.f2{transform:rotateY(90deg) translateZ(72px);}
.dice-face.f3{transform:rotateY(180deg) translateZ(72px);}
.dice-face.f4{transform:rotateY(-90deg) translateZ(72px);}
.dice-face.f5{transform:rotateX(90deg) translateZ(72px);}
.dice-face.f6{transform:rotateX(-90deg) translateZ(72px);}

function getBoardPositions() {
  const boardArea = document.querySelector('.board-area');
  const areaW = boardArea ? boardArea.offsetWidth : window.innerWidth;
  const areaH = boardArea ? boardArea.offsetHeight : 340;

  // Crown house center in salty.png sits a bit below visual middle.
  const cx = areaW * 0.5;
  const cy = areaH * 0.56;

  // Force a circular track (single radius), not ellipse.
  const radius = Math.max(132, Math.min(areaW, areaH) * 0.40);

  const positions = [];
  for(let i = 0; i < TOTAL_TILES; i++) {
    const angle = (i / TOTAL_TILES) * Math.PI * 2 - Math.PI / 2;
    positions.push({
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle)
    });
  }
  return positions;
}

function buildBoard() {
  const track = document.getElementById('boardTrack');
  track.innerHTML = '';
  const positions = getBoardPositions();

    el.className = `tile ${tile.type}`;
    el.id = `tile-${i}`;
    el.style.left = (positions[i].x - 22) + 'px';
    el.style.top = (positions[i].y - 22) + 'px';

    el.onclick = () => showTileInfo(i);

}

let diceRoller = null;
const DICE_FACE_ROT = {
  1:[ Math.PI/2,  0,          0],
  2:[ 0,          0,          0],
  3:[ 0,         -Math.PI/2,  0],
  4:[ 0,          Math.PI/2,  0],
  5:[ 0,          Math.PI,    0],
  6:[-Math.PI/2,  0,          0],
};

function createDiceFaceTexture(n){
  const S = 256;
  const cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const cx = cv.getContext('2d');
  cx.fillStyle = '#050505';
  cx.fillRect(0,0,S,S);
  const pad = 10;
  cx.fillStyle = '#f2ede8';
  cx.strokeStyle = 'rgba(0,0,0,0.09)';
  cx.lineWidth = 1.4;
  const r = 18;
  cx.beginPath();
  cx.moveTo(pad+r,pad);
  cx.lineTo(S-pad-r,pad); cx.quadraticCurveTo(S-pad,pad,S-pad,pad+r);
  cx.lineTo(S-pad,S-pad-r); cx.quadraticCurveTo(S-pad,S-pad,S-pad-r,S-pad);
  cx.lineTo(pad+r,S-pad); cx.quadraticCurveTo(pad,S-pad,pad,S-pad-r);
  cx.lineTo(pad,pad+r); cx.quadraticCurveTo(pad,pad,pad+r,pad);
  cx.closePath();
  cx.fill(); cx.stroke();

  const map = {
    1:[[128,128]],
    2:[[176,80],[80,176]],
    3:[[176,80],[128,128],[80,176]],
    4:[[80,80],[176,80],[80,176],[176,176]],
    5:[[80,80],[176,80],[128,128],[80,176],[176,176]],
    6:[[80,74],[176,74],[80,128],[176,128],[80,182],[176,182]],
  };
  map[n].forEach(([px,py])=>{
    const g = cx.createRadialGradient(px-6,py-7,2,px,py,18);
    g.addColorStop(0,'#353535');
    g.addColorStop(1,'#060606');
    cx.fillStyle = g;
    cx.beginPath();
    cx.arc(px,py,13,0,Math.PI*2);
    cx.fill();
  });
  const tex = new THREE.CanvasTexture(cv);
  tex.anisotropy = 8;
  return tex;
}

function initDiceRoller() {
  if(diceRoller || typeof THREE === 'undefined') return;
  const stage = document.getElementById('dice-stage');
  if(!stage) return;
  const w = stage.clientWidth || window.innerWidth;
  const h = stage.clientHeight || window.innerHeight;
  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  renderer.shadowMap.enabled = true;
  stage.innerHTML = '';
  stage.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(36, w / h, 0.1, 100);
  camera.position.set(0,2.9,7.2);
  camera.lookAt(0,0,0);

  scene.add(new THREE.AmbientLight(0xffffff, .55));
  const key = new THREE.DirectionalLight(0xffffff, 1.45);
  key.position.set(5,9,6);
  key.castShadow = true;
  scene.add(key);
  const rim = new THREE.DirectionalLight(0xffffff, .3);
  rim.position.set(-6,1,-4);
  scene.add(rim);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.ShadowMaterial({opacity:.4})
  );
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -1.1;
  floor.receiveShadow = true;
  scene.add(floor);

  const geo = new THREE.BoxGeometry(1.2,1.2,1.2);
  const order = [3,4,1,6,2,5];
  const mats = order.map(num => new THREE.MeshStandardMaterial({map:createDiceFaceTexture(num), roughness:.12, metalness:0}));
  const dice = new THREE.Mesh(geo, mats);
  dice.castShadow = true;
  dice.rotation.set(...DICE_FACE_ROT[1]);
  scene.add(dice);

  diceRoller = {stage, renderer, scene, camera, dice, rollReq: null};
}

function playDiceRollAnimation(resultValue) {
  return new Promise((resolve) => {
    if(typeof THREE === 'undefined') {
      setTimeout(() => resolve(resultValue), 1100);
      return;
    }
    initDiceRoller();
    if(!diceRoller) {
      setTimeout(() => resolve(resultValue), 1100);
      return;
    }
    const {renderer, scene, camera, dice} = diceRoller;
    const duration = 2400;
    const start = performance.now();
    const s = {x:dice.rotation.x, y:dice.rotation.y, z:dice.rotation.z};
    const [fx, fy, fz] = DICE_FACE_ROT[resultValue];
    const ex = fx + (Math.floor(Math.random()*4)+4)*Math.PI*2;
    const ey = fy + (Math.floor(Math.random()*4)+4)*Math.PI*2;
    const ez = fz + (Math.floor(Math.random()*3)+3)*Math.PI*2;

    function step(now){
      const t = Math.min(1, (now - start) / duration);
      const e = t < .5 ? 8*t*t*t*t : 1 - Math.pow(-2*t + 2, 4) / 2;
      dice.rotation.x = s.x + (ex - s.x) * e;
      dice.rotation.y = s.y + (ey - s.y) * e;
      dice.rotation.z = s.z + (ez - s.z) * e;
      if(t < .45) {
        dice.position.y = Math.sin((t/.45) * Math.PI) * 1.05;
      } else {
        const t2 = (t - .45) / .55;
        dice.position.y = (1 - t2) * .28;
      }
      renderer.render(scene, camera);
      if(t < 1){
        diceRoller.rollReq = requestAnimationFrame(step);
      } else {
        dice.rotation.set(...DICE_FACE_ROT[resultValue]);
        dice.position.y = 0;
        renderer.render(scene, camera);
        resolve(resultValue);
      }
    }
    if(diceRoller.rollReq) cancelAnimationFrame(diceRoller.rollReq);
    diceRoller.rollReq = requestAnimationFrame(step);
  });
}

function rollDice() {
  if(state.isRolling || state.spins <= 0) {
    if(state.spins <= 0) showToast('⚙️ No spins left! Wait for refill.');
    return;
  }
  state.isRolling = true;
  state.spins--;
  updateUI();

  const rollBtn = document.getElementById('rollBtn');
  rollBtn.classList.add('rolling');
  triggerCameraFX('camera-roll', 460);

  // Show dice overlay
  const overlay = document.getElementById('dice-overlay');
  const diceText = document.getElementById('dice-num-text');
  overlay.classList.add('show');
  diceText.classList.remove('show');
  diceText.textContent = '';

  const roll = Math.floor(Math.random()*6)+1;
  playDiceRollAnimation(roll).then(() => {
    diceText.textContent = roll;
    diceText.classList.add('show');
    setTimeout(() => {
      overlay.classList.remove('show');
      diceText.classList.remove('show');
      rollBtn.classList.remove('rolling');
      movePiece(roll);
    }, 900);
  });
}

function movePiece(steps) {
  let step = 0;
  const move = setInterval(() => {
    step++;
    state.playerPos = (state.playerPos + 1) % TOTAL_TILES;
    updatePlayerPosition(state.playerPos);
    if(step % 2 === 0) triggerCameraFX('camera-roll', 180);
    if(step >= steps) {
      clearInterval(move);
      setTimeout(() => {
        landOnTile(state.playerPos);
        state.isRolling = false;
      }, 200);
    }
  }, 200);
}

function burstAtCurrentTile(count = 12) {

  const cy = tileRect.top + tileRect.height / 2 - layerRect.top;

function landOnTile(pos) {
  triggerCameraFX('camera-land', 260);
  burstAtCurrentTile(14);
  const tile = TILE_DEFS[pos];
  switch(tile.type) {
    case 'coin': {
      const baseReward = [500,500,500,1000,1000,2000][Math.floor(Math.random()*6)];

      spawnCoins();
      break;
    }
    case 'chest': {
      state.booty = Math.min(state.booty+1, state.maxBooty);
      const reward = Math.floor(Math.random()*5000)+2000;
      addCoins(reward);
      updateUI();
      showModal(`<h2>🧰 BOOTY CHEST!</h2><div class="reward-amount">+${reward.toLocaleString()}</div><p>A chest of buried treasure! Booty chests: ${state.booty}/${state.maxBooty}</p><button class="close-btn" onclick="closeModal()">Brilliant!</button>`);
      break;
    }
    case 'multiplier': {
      const mult = tile.mult || 2;
      state.multiplier = mult;
      showModal(`<h2>⚡ ${mult}X MULTIPLIER!</h2><div class="reward-amount">${mult}X</div><p>Your next coin reward is multiplied by ${mult}!</p><button class="close-btn" onclick="closeModal()">Arrr!</button>`);
      break;
    }
    case 'skull': {
      doRaid();
      break;
    }
    case 'crown': {
      const reward = 3000;
      addCoins(reward);
      state.level++;
      updateUI();
      showModal(`<h2>👑 CROWN CLAIMED!</h2><div class="reward-amount">+${reward.toLocaleString()}</div><p>You leveled up to LVL ${state.level}! Rule the seas, Captain!</p><button class="close-btn" onclick="closeModal()">Glory!</button>`);
      break;
    }
    case 'wheel': {
      showToast('🎡 Wheel tile activated! Spin for reward.');
      openWheel();
      break;
    }
    case 'start': {
      const reward = 5000;
      addCoins(reward);
      state.spins = Math.min(state.spins+5, state.maxSpins);
      showModal(`<h2>🏴‍☠️ BACK TO PORT!</h2><div class="reward-amount">+${reward.toLocaleString()}</div><p>Completed a full voyage! Earned bonus gold and 5 spins!</p><button class="close-btn" onclick="closeModal()">Set Sail!</button>`);
      break;
    }
  }
}

function doRaid() {
  const target = state.raidTargets[Math.floor(Math.random()*state.raidTargets.length)];

}

function drawWheel(rot = wheelAngle) {
  const canvas = document.getElementById('wheelCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const CX = canvas.width / 2;
  const CY = canvas.height / 2;
  const R = 250;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();

  for(let i = 0; i < WHEEL_SEGMENTS.length; i++) {
    const startA = rot + i * WHEEL_SLICE - Math.PI/2;
    const endA = startA + WHEEL_SLICE;
    const seg = WHEEL_SEGMENTS[i];
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R - 20, startA, endA);
    ctx.closePath();
    const g = ctx.createRadialGradient(CX, CY, 60, CX, CY, R - 20);
    g.addColorStop(0, seg.dark);
    g.addColorStop(0.8, seg.color);
    g.addColorStop(1, seg.dark);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(startA + WHEEL_SLICE/2);
    const rr = (R - 20) * 0.63;
    ctx.font = seg.isJackpot ? '700 20px Cinzel, serif' : '700 24px Cinzel Decorative, serif';
    ctx.fillStyle = seg.isJackpot ? '#ffe566' : '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.8)';
    ctx.shadowBlur = 6;
    ctx.fillText(seg.isJackpot ? 'JP' : seg.label, rr, 0);
    ctx.restore();
  }

  const rim = ctx.createRadialGradient(CX, CY, R - 30, CX, CY, R + 6);
  rim.addColorStop(0, '#593e00');
  rim.addColorStop(0.3, '#ffea80');
  rim.addColorStop(0.6, '#ffd700');
  rim.addColorStop(1, '#3a2800');
  ctx.beginPath();
  ctx.arc(CX, CY, R - 10, 0, Math.PI * 2);
  ctx.strokeStyle = rim;
  ctx.lineWidth = 18;
  ctx.stroke();
}

function drawWheelHub(rot = wheelAngle) {
  const hub = document.getElementById('hubCanvas');
  if(!hub) return;
  const c = hub.getContext('2d');
  const cx = hub.width / 2;
  const cy = hub.height / 2;
  c.clearRect(0,0,hub.width,hub.height);
  const ring = c.createLinearGradient(0,0,hub.width,hub.height);
  ring.addColorStop(0,'#ffea80');
  ring.addColorStop(.5,'#b8860b');
  ring.addColorStop(1,'#423000');
  c.beginPath();
  c.arc(cx,cy,54,0,Math.PI*2);
  c.fillStyle = ring;
  c.fill();
  const core = c.createRadialGradient(cx-5,cy-5,6,cx,cy,48);
  core.addColorStop(0,'#22394a');
  core.addColorStop(.7,'#0b151d');
  core.addColorStop(1,'#02060a');
  c.beginPath();
  c.arc(cx,cy,46,0,Math.PI*2);
  c.fillStyle = core;
  c.fill();
  if(wheelHubImage.complete && wheelHubImage.naturalWidth > 0) {
    const iconSize = 52;
    c.save();
    c.translate(cx, cy);
    c.rotate(rot);
    c.beginPath();
    c.arc(0, 0, 28, 0, Math.PI * 2);
    c.clip();
    c.drawImage(wheelHubImage, -iconSize / 2, -iconSize / 2, iconSize, iconSize);
    c.restore();
  } else {
    c.font = '900 12px Cinzel, serif';
    c.fillStyle = '#ffea80';
    c.textAlign = 'center';
    c.fillText('SPIN', cx, cy + 4);
  }
}

function initWheel() {
  drawWheel();
  drawWheelHub(wheelAngle);
  const hub = document.getElementById('hubCanvas');
  if(hub && !hub.dataset.bound) {
    hub.addEventListener('click', spinWheel);
    hub.dataset.bound = '1';
  }
}

function openWheel() {
  document.getElementById('wheelOverlay').classList.remove('hidden');
  document.getElementById('wheelResult').textContent = '';
  initWheel();
}

function closeWheel() {
  if(wheelSpinning) return;
  document.getElementById('wheelOverlay').classList.add('hidden');
}

function getWheelWinner() {
  const norm = ((wheelAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const pointer = ((Math.PI*2 - norm) + Math.PI*2) % (Math.PI*2);
  const idx = Math.floor(pointer / WHEEL_SLICE) % WHEEL_SEGMENTS.length;
  return WHEEL_SEGMENTS[idx];
}

function spinWheel() {
  if(wheelSpinning) return;
  const btn = document.getElementById('wheelSpinBtn');
  const resultEl = document.getElementById('wheelResult');
  wheelSpinning = true;
  if(btn) btn.disabled = true;
  resultEl.textContent = '';
  const spins = (6 + Math.floor(Math.random() * 4)) * Math.PI * 2;
  const targetOffset = Math.random() * Math.PI * 2;
  const target = wheelAngle + spins + targetOffset;
  const duration = 4200;
  const start = performance.now();
  const from = wheelAngle;
  function easeOut(t){ return 1 - Math.pow(1 - t, 4); }
  function tick(now){
    const p = Math.min(1, (now - start) / duration);
    wheelAngle = from + (target - from) * easeOut(p);
    drawWheel(wheelAngle);
    drawWheelHub(wheelAngle);
    if(p < 1) {
      requestAnimationFrame(tick);
      return;
    }
    wheelAngle %= (Math.PI * 2);
    wheelSpinning = false;
    state.wheelSpinsUsed++;
    const win = getWheelWinner();
    addCoins(win.pts);
    resultEl.textContent = win.isJackpot ? `JACKPOT! +${win.pts.toLocaleString()} Points` : `+${win.pts.toLocaleString()} Points`;
    showModal(`<h2>🎡 WHEEL REWARD!</h2><div class="reward-amount">+${win.pts.toLocaleString()}</div><p>${win.isJackpot ? 'JACKPOT HIT! Incredible luck, Captain!' : 'Wheel reward added to your treasury.'}</p><button class="close-btn" onclick="closeModal()">Claim</button>`);
    spawnCoins();
    if(btn) btn.disabled = false;
  }
  requestAnimationFrame(tick);
}

function spawnCoins() {
  for(let i=0;i<5;i++) {
    setTimeout(()=>{
      const coin = document.createElement('div');
      coin.className = 'coin-fly';
      coin.textContent = '🪙';
      coin.style.left = (30+Math.random()*40)+'%';
      coin.style.top = '50%';
      document.body.appendChild(coin);
      setTimeout(()=>coin.remove(),1100);
    }, i*120);
  }
}

function claimDaily() {

  showModal(`<h2>🎁 DAY ${state.dailyDay-1} CLAIMED!</h2><div class="reward-amount">+${reward.toLocaleString()}</div><p>Come back tomorrow for Day ${state.dailyDay} reward!</p><button class="close-btn" onclick="closeModal()">🏴‍☠️ Arrr!</button>`);

function openBootyChest(cost, name, val) {
  if(state.booty < cost) {
    showToast(`Need ${cost} Booty Chests! You have ${state.booty}.`);
    return;
  }
  state.booty -= cost;
  const parts = val.split('-');
  const min = parseInt(parts[0].replace(/,/g,'').replace('K','000'))||2000;
  const max = parseInt(parts[1]?parts[1].replace(/,/g,'').replace('K','000').replace(' coins',''):min)||5000;
  const reward = Math.floor(Math.random()*(max-min)+min);
  addCoins(reward);
  renderRewards();
  showModal(`<h2>🧰 ${name} OPENED!</h2><div class="reward-amount">+${reward.toLocaleString()}</div><p>The chest bursts with gold!</p><button class="close-btn" onclick="closeModal()">Treasure!</button>`);
  spawnCoins();
}
